quarkus:
  application:
    name: victron-svc
  info:
    git:
      enabled: true
  http:
    port: 8090
  log:
    category:
      "de.mhome.victron":
        level: INFO
  datasource:
    db-kind: other
    jdbc:
      driver: org.sqlite.JDBC
      url: jdbc:sqlite:${VICTRON_DB_PATH:./data/db/victron.db}
      max-size: 4

victron:
  ble:
    adapter: hci0          # BlueZ Adapter
    scan-interval: 2s      # häufiges Pollen des BlueZ-Caches auf neue Advertisement-Werte
    inventory-interval: 5m # periodischer BLE-Inventory-Scan (alle sichtbaren Geräte, Blacklist-gefiltert): Log + Metrik
    auto-start: true       # Scanning startet automatisch; per POST /api/victron/scan/stop abschaltbar
    blacklist-names: "NO*"  # kommagetrennt, case-insensitive Glob-Pattern auf den ganzen Namen (* / ?)
    blacklist-macs: ""     # kommagetrennte MAC-Adressen
  # Geräte werden NICHT hier definiert, sondern außerhalb in der .env-Datei
  # (siehe .env.example). Docker Compose injiziert sie als
  # VICTRON_DEVICES_<n>_{MAC,NAME,TYPE,ADVERTISEMENT_KEY}; SmallRye Config
  # mappt diese auf victron.devices[<n>].*. Bewusst KEIN devices-Eintrag hier:
  # eine leere YAML-Liste ([]) würde die indizierte Env-Struktur überschreiben
  # (SRCFG00050). Die Liste stammt also rein aus der .env.
