services:
  victron-svc:
    build: .
    image: victron-svc:latest
    container_name: victron-svc
    restart: unless-stopped
    # BlueZ runs on the host. Share the host network and D-Bus socket so the
    # container can talk to BlueZ on hci0.
    network_mode: host
    volumes:
      - /var/run/dbus:/var/run/dbus
      - ./data/db:/app/data/db
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      QUARKUS_HTTP_HOST: "0.0.0.0"
      VICTRON_DB_PATH: /app/data/db/victron.db
      # Override device credentials via .env or here:
      # VICTRON_DEVICES_0_MAC: "C0:3E:..."
      # VICTRON_DEVICES_0_ADVERTISEMENT_KEY: "deadbeef..."
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/q/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
