services:
  # Fixes data/db ownership on first start (runs as root, exits immediately).
  init-permissions:
    image: alpine:3
    volumes:
      - ./data/db:/data/db
    command: ["sh", "-c", "mkdir -p /data/db && chown -R ${UID:-1000}:${GID:-1000} /data/db"]

  victron-svc:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
        GIT_TIME: ${GIT_TIME:-}
    image: victron-svc:latest
    container_name: victron-svc
    restart: unless-stopped
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    # BlueZ runs on the host. Share the host network and D-Bus socket so the
    # container can talk to BlueZ on hci0.
    network_mode: host
    volumes:
      - /var/run/dbus:/var/run/dbus
      - ./data/db:/app/data/db
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Device list + advertisement keys come from the host-only .env file
    # (gitignored, see .env.example). Compose reads it and injects the
    # VICTRON_DEVICES_<n>_* variables into the container — .env is never baked
    # into the image.
    env_file:
      - .env
    environment:
      QUARKUS_HTTP_HOST: "0.0.0.0"
      VICTRON_DB_PATH: /app/data/db/victron.db
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8090/q/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
